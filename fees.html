<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fees — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <header class="topbar"></header>
      <div class="content">

        <div class="stats stagger" id="feeStats"></div>

        <div class="toolbar">
          <select id="filterStudent" class="select"><option value="">All Students</option></select>
          <select id="filterMonth" class="select"><option value="">All Months</option></select>
          <input id="search" class="input" type="text" placeholder="Search by student or receipt..." />
          <div class="spacer"></div>
          <button class="btn btn-primary" onclick="openAdd()">+ Record Payment</button>
        </div>

        <div class="card">
          <div class="card-header"><h3>Payment History</h3></div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Receipt</th>
                  <th>Date</th>
                  <th>Student</th>
                  <th>Batch</th>
                  <th>Month</th>
                  <th>Amount</th>
                  <th>Mode</th>
                  <th>Note</th>
                  <th style="width: 160px;">Actions</th>
                </tr>
              </thead>
              <tbody id="feeList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Payment Modal -->
  <div id="feeModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Record Fee Payment</h3>
        <button class="modal-close" onclick="UI.closeModal('feeModal')">&times;</button>
      </div>
      <form id="feeForm">
        <div class="modal-body">
          <div class="field">
            <label>Student <span style="color:var(--danger)">*</span></label>
            <select id="studentId" class="select" required></select>
          </div>
          <div class="row row-2">
            <div class="field">
              <label>Amount (&#8377;) <span style="color:var(--danger)">*</span></label>
              <input id="amount" class="input" type="number" min="1" step="1" required />
            </div>
            <div class="field">
              <label>Date <span style="color:var(--danger)">*</span></label>
              <input id="date" class="input" type="date" required />
            </div>
          </div>
          <div class="row row-2">
            <div class="field">
              <label>For Month <span style="color:var(--danger)">*</span></label>
              <input id="month" class="input" type="month" required />
            </div>
            <div class="field">
              <label>Payment Mode</label>
              <select id="mode" class="select">
                <option>Cash</option>
                <option>UPI</option>
                <option>Bank Transfer</option>
                <option>Card</option>
                <option>Cheque</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Note (optional)</label>
            <input id="note" class="input" type="text" placeholder="e.g. Tuition + lab fee" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="UI.closeModal('feeModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Payment</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Receipt Modal -->
  <div id="receiptModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Payment Receipt</h3>
        <button class="modal-close" onclick="UI.closeModal('receiptModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="receipt" id="receiptBody"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('receiptModal')">Close</button>
        <button id="receiptShareBtn" class="btn btn-success">&#128241; Share on WhatsApp</button>
        <button class="btn btn-primary" onclick="window.print()">&#128424; Print</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/fees.js"></script>
</body>
</html>
