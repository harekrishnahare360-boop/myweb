<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Check Results — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/landing.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="landing-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo">SK</div>
        <span>Sk Study Way</span>
      </a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="view-attendance.html">Attendance</a></li>
        <li><a href="view-results.html" style="color:var(--primary);font-weight:600;">Results</a></li>
        <li><a href="view-fees.html">Fee Status</a></li>
        <li class="nav-cta"><a href="admin.html" class="btn btn-primary">Admin Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="public-page">
    <div class="public-container">
      <div class="public-header">
        <h1>Check Your Results</h1>
        <p>Enter your roll number to view your exam results and report cards</p>
      </div>

      <div class="search-box">
        <input id="rollInput" class="input" type="text" placeholder="Enter Roll Number..." autofocus />
        <button class="btn btn-primary" onclick="searchResults()">Search</button>
      </div>

      <div id="resultArea"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    function gradeFor(pct) {
      if (pct >= 90) return { g: 'A+', cls: 'badge-success' };
      if (pct >= 80) return { g: 'A',  cls: 'badge-success' };
      if (pct >= 70) return { g: 'B+', cls: 'badge-info' };
      if (pct >= 60) return { g: 'B',  cls: 'badge-info' };
      if (pct >= 50) return { g: 'C',  cls: 'badge-warning' };
      if (pct >= 40) return { g: 'D',  cls: 'badge-warning' };
      return { g: 'F', cls: 'badge-danger' };
    }

    function searchResults() {
      const roll = document.getElementById('rollInput').value.trim();
      const area = document.getElementById('resultArea');

      if (!roll) { area.innerHTML = ''; return; }

      const students = DB.getStudents();
      const student = students.find(s => s.roll && s.roll.toLowerCase() === roll.toLowerCase());

      if (!student) {
        area.innerHTML = `
          <div class="no-result">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0 00-3.198 1.318M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"/></svg>
            <h3>Student Not Found</h3>
            <p>No student found with roll number "<strong>${escHtml(roll)}</strong>". Please check and try again.</p>
          </div>
        `;
        return;
      }

      const results = DB.resultsByStudent(student.id).sort((a, b) => (b.examDate || '').localeCompare(a.examDate || ''));
      const initials = (student.name || '?').charAt(0).toUpperCase();

      if (results.length === 0) {
        area.innerHTML = `
          <div class="result-panel">
            <div class="result-panel-header">
              <div class="result-panel-avatar">${initials}</div>
              <div class="result-panel-info">
                <h3>${escHtml(student.name)}</h3>
                <p>Roll: ${escHtml(student.roll)} | Class: ${escHtml(student.class)}${student.section ? ' - ' + escHtml(student.section) : ''}</p>
              </div>
            </div>
            <div class="result-panel-body">
              <div style="text-align:center;padding:40px;color:var(--text-muted);">
                <p>No results have been published yet for this student.</p>
              </div>
            </div>
          </div>
        `;
        return;
      }

      let cardsHtml = results.map(r => {
        const obtained = r.subjects.reduce((s, x) => s + Number(x.marks || 0), 0);
        const max = r.subjects.reduce((s, x) => s + Number(x.outOf || 0), 0);
        const pct = max ? Math.round((obtained / max) * 100) : 0;
        const g = gradeFor(pct);

        const subjectRows = r.subjects.map((sub, i) => {
          const sp = sub.outOf ? Math.round((sub.marks / sub.outOf) * 100) : 0;
          const sg = gradeFor(sp);
          return `<tr>
            <td>${i + 1}</td>
            <td>${escHtml(sub.name)}</td>
            <td style="text-align:center;"><strong>${sub.marks}</strong></td>
            <td style="text-align:center;">${sub.outOf}</td>
            <td style="text-align:center;">${sp}%</td>
            <td><span class="badge ${sg.cls}">${sg.g}</span></td>
          </tr>`;
        }).join('');

        const dateStr = r.examDate ? new Date(r.examDate + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';

        return `
          <div class="card" style="margin-bottom:20px;">
            <div class="card-header">
              <h3>${escHtml(r.examName)}</h3>
              <span style="font-size:13px;color:var(--text-muted);">${dateStr}</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div class="table-wrap">
                <table class="table" style="margin:0;">
                  <thead><tr><th>#</th><th>Subject</th><th style="text-align:center;">Marks</th><th style="text-align:center;">Out of</th><th style="text-align:center;">%</th><th>Grade</th></tr></thead>
                  <tbody>${subjectRows}</tbody>
                </table>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; padding:20px; background:var(--primary-light); text-align:center;">
                <div>
                  <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Total</div>
                  <div style="font-size:20px;font-weight:700;color:var(--primary-dark);">${obtained} / ${max}</div>
                </div>
                <div>
                  <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Percentage</div>
                  <div style="font-size:20px;font-weight:700;color:var(--primary-dark);">${pct}%</div>
                </div>
                <div>
                  <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Grade</div>
                  <div style="font-size:20px;font-weight:700;"><span class="badge ${g.cls}" style="font-size:14px;padding:5px 14px;">${g.g}</span></div>
                </div>
              </div>
              ${r.remarks ? `<div style="padding:16px 20px;border-top:1px solid var(--border);font-size:14px;"><strong>Remarks:</strong> ${escHtml(r.remarks)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      area.innerHTML = `
        <div class="result-panel" style="border:none;background:transparent;overflow:visible;">
          <div class="result-panel-header" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;">
            <div class="result-panel-avatar">${initials}</div>
            <div class="result-panel-info">
              <h3>${escHtml(student.name)}</h3>
              <p>Roll: ${escHtml(student.roll)} | Class: ${escHtml(student.class)}${student.section ? ' - ' + escHtml(student.section) : ''}</p>
            </div>
          </div>
          ${cardsHtml}
        </div>
      `;
    }

    function escHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    document.getElementById('rollInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchResults();
    });
  </script>
</body>
</html>
