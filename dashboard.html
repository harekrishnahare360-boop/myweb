<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <header class="topbar"></header>
      <div class="content">
        <div class="stats" id="stats"></div>

        <div class="row row-2" style="grid-template-columns: 2fr 1fr;">
          <div class="card">
            <div class="card-header"><h3>Recent Fee Payments</h3><a href="fees.html">View all \u2192</a></div>
            <div class="table-wrap">
              <table class="table">
                <thead><tr><th>Date</th><th>Student</th><th>Amount</th><th>Mode</th></tr></thead>
                <tbody id="recentFees"></tbody>
              </table>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>Today's Attendance</h3><a href="attendance.html">Mark \u2192</a></div>
            <div class="card-body" id="todayAtt"></div>
          </div>
        </div>

        <div class="card" style="margin-top: 18px;">
          <div class="card-header"><h3>Welcome to Sk Study Way</h3></div>
          <div class="card-body">
            <p style="color: var(--text-muted); margin-bottom: 14px;">
              A complete tuition management system. Manage students, track fees, mark attendance, and record results — all in one place.
            </p>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
              <a href="students.html" class="btn btn-primary">+ Add Student</a>
              <a href="fees.html" class="btn btn-ghost">Record Fee</a>
              <a href="attendance.html" class="btn btn-ghost">Mark Attendance</a>
              <a href="results.html" class="btn btn-ghost">Enter Results</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
