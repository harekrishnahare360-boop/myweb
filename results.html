<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Results — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <header class="topbar"></header>
      <div class="content">

        <div class="toolbar">
          <select id="filterStudent" class="select"><option value="">All Students</option></select>
          <select id="filterExam" class="select"><option value="">All Exams</option></select>
          <div class="spacer"></div>
          <button class="btn btn-primary" onclick="openAdd()">+ Enter Marks</button>
        </div>

        <div class="card">
          <div class="card-header"><h3>Recorded Results</h3></div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Batch</th>
                  <th>Exam</th>
                  <th>Date</th>
                  <th>Subjects</th>
                  <th>Total</th>
                  <th>%</th>
                  <th>Grade</th>
                  <th style="width: 200px;">Actions</th>
                </tr>
              </thead>
              <tbody id="resultList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Result Modal -->
  <div id="resultModal" class="modal-backdrop hidden">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Enter Marks</h3>
        <button class="modal-close" onclick="UI.closeModal('resultModal')">&times;</button>
      </div>
      <form id="resultForm">
        <div class="modal-body">
          <div class="row row-3">
            <div class="field">
              <label>Student <span style="color:var(--danger)">*</span></label>
              <select id="studentId" class="select" required></select>
            </div>
            <div class="field">
              <label>Exam Name <span style="color:var(--danger)">*</span></label>
              <input id="examName" class="input" type="text" placeholder="e.g. Mid-Term Sept" required />
            </div>
            <div class="field">
              <label>Date</label>
              <input id="examDate" class="input" type="date" />
            </div>
          </div>

          <div style="margin-top:8px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between;">
            <strong style="font-size:14px;">Subjects</strong>
            <button type="button" class="btn btn-ghost btn-sm" onclick="addSubjectRow()">+ Add Subject</button>
          </div>
          <div class="table-wrap" style="border:1px solid var(--border); border-radius:8px;">
            <table class="table" style="margin:0;">
              <thead>
                <tr>
                  <th>Subject</th>
                  <th style="width:120px;">Marks</th>
                  <th style="width:120px;">Out of</th>
                  <th style="width:60px;"></th>
                </tr>
              </thead>
              <tbody id="subjectRows"></tbody>
            </table>
          </div>

          <div class="field" style="margin-top:14px;">
            <label>Remarks (optional)</label>
            <textarea id="remarks" class="textarea" rows="2" placeholder="e.g. Excellent improvement in math"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="UI.closeModal('resultModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Result</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Report Card Modal -->
  <div id="cardModal" class="modal-backdrop hidden">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Report Card</h3>
        <button class="modal-close" onclick="UI.closeModal('cardModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="cardBody"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('cardModal')">Close</button>
        <button id="cardShareBtn" class="btn btn-success">&#128241; Share on WhatsApp</button>
        <button class="btn btn-primary" onclick="window.print()">&#128424; Print</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
