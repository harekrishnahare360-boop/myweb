<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Check Attendance — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/landing.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="landing-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo">SK</div>
        <span>Sk Study Way</span>
      </a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="view-attendance.html" style="color:var(--primary);font-weight:600;">Attendance</a></li>
        <li><a href="view-results.html">Results</a></li>
        <li><a href="view-fees.html">Fee Status</a></li>
        <li class="nav-cta"><a href="admin.html" class="btn btn-primary">Admin Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="public-page">
    <div class="public-container">
      <div class="public-header">
        <h1>Check Your Attendance</h1>
        <p>Enter your roll number to view your attendance record</p>
      </div>

      <div class="search-box">
        <input id="rollInput" class="input" type="text" placeholder="Enter Roll Number..." autofocus />
        <button class="btn btn-primary" onclick="searchAttendance()">Search</button>
      </div>

      <div id="resultArea"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    function searchAttendance() {
      const roll = document.getElementById('rollInput').value.trim();
      const area = document.getElementById('resultArea');

      if (!roll) {
        area.innerHTML = '';
        return;
      }

      const students = DB.getStudents();
      const student = students.find(s => s.roll && s.roll.toLowerCase() === roll.toLowerCase());

      if (!student) {
        area.innerHTML = `
          <div class="no-result">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0 00-3.198 1.318M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"/></svg>
            <h3>Student Not Found</h3>
            <p>No student found with roll number "<strong>${escHtml(roll)}</strong>". Please check and try again.</p>
          </div>
        `;
        return;
      }

      // Get attendance records
      const records = DB.attendanceByStudent(student.id);
      const total = records.length;
      const present = records.filter(a => a.status === 'present').length;
      const absent = records.filter(a => a.status === 'absent').length;
      const late = records.filter(a => a.status === 'late').length;
      const pct = total ? Math.round(((present + late * 0.5) / total) * 100) : 0;

      const initials = (student.name || '?').charAt(0).toUpperCase();

      // Recent 30 records
      const recent = [...records].sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 30);

      let recentHtml = '';
      if (recent.length > 0) {
        recentHtml = `
          <table class="table" style="margin-top:0;">
            <thead><tr><th>Date</th><th>Day</th><th>Status</th></tr></thead>
            <tbody>
              ${recent.map(r => {
                const d = new Date(r.date + 'T00:00:00');
                const day = d.toLocaleDateString('en-IN', { weekday: 'short' });
                const dateStr = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                const badge = r.status === 'present' ? '<span class="badge badge-success">Present</span>' :
                              r.status === 'absent' ? '<span class="badge badge-danger">Absent</span>' :
                              '<span class="badge badge-warning">Late</span>';
                return `<tr><td>${dateStr}</td><td>${day}</td><td>${badge}</td></tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      } else {
        recentHtml = `<div style="padding:30px;text-align:center;color:var(--text-muted);">No attendance records found yet.</div>`;
      }

      area.innerHTML = `
        <div class="result-panel">
          <div class="result-panel-header">
            <div class="result-panel-avatar">${initials}</div>
            <div class="result-panel-info">
              <h3>${escHtml(student.name)}</h3>
              <p>Roll: ${escHtml(student.roll)} | Class: ${escHtml(student.class)}${student.section ? ' - ' + escHtml(student.section) : ''}</p>
            </div>
          </div>
          <div class="result-panel-body">
            <div class="stats" style="margin-bottom:24px;">
              <div class="stat">
                <div class="stat-icon green">&#10003;</div>
                <div class="stat-label">Present</div>
                <div class="stat-value" style="color:var(--success);">${present}</div>
              </div>
              <div class="stat">
                <div class="stat-icon red">&#10007;</div>
                <div class="stat-label">Absent</div>
                <div class="stat-value" style="color:var(--danger);">${absent}</div>
              </div>
              <div class="stat">
                <div class="stat-icon amber">&#10711;</div>
                <div class="stat-label">Late</div>
                <div class="stat-value" style="color:var(--warning);">${late}</div>
              </div>
              <div class="stat">
                <div class="stat-icon indigo">%</div>
                <div class="stat-label">Attendance %</div>
                <div class="stat-value" style="color:var(--primary);">${pct}%</div>
              </div>
            </div>

            <h4 style="margin-bottom:12px; font-size:15px;">Recent Records (Last 30 days)</h4>
            <div class="table-wrap">${recentHtml}</div>
          </div>
        </div>
      `;
    }

    function escHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Also allow Enter key
    document.getElementById('rollInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchAttendance();
    });
  </script>
</body>
</html>
