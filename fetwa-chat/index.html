<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetwa Chat</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-logo">F</div>
          <div class="brand-name">Fetwa Chat</div>
        </div>
        <button class="icon-btn" id="closeSidebarBtn" title="Close sidebar" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>

      <div class="conversation-list" id="conversationList">
        <!-- Conversation items injected here -->
      </div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="settingsBtn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
        <button class="footer-btn danger" id="clearAllBtn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
          Clear all chats
        </button>
      </div>
    </aside>

    <!-- Main area -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="openSidebarBtn" title="Open sidebar" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="model-select-wrap">
          <select id="modelSelect" class="model-select" aria-label="Model">
            <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
            <option value="claude-opus-4-1">Claude Opus 4.1</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="claude-3-7-sonnet-latest">Claude 3.7 Sonnet</option>
            <option value="claude-3-5-haiku-latest">Claude 3.5 Haiku</option>
          </select>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-title" id="topbarTitle">New conversation</div>
      </header>

      <section class="messages" id="messages">
        <!-- Welcome / messages injected here -->
      </section>

      <footer class="composer">
        <form class="composer-form" id="composerForm" autocomplete="off">
          <textarea
            id="promptInput"
            class="composer-input"
            placeholder="Message Fetwa Chat..."
            rows="1"
          ></textarea>
          <button type="button" class="composer-btn stop" id="stopBtn" hidden title="Stop generating">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
          <button type="submit" class="composer-btn send" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/></svg>
          </button>
        </form>
        <div class="composer-hint">
          Fetwa Chat can make mistakes. Verify important information.
        </div>
      </footer>
    </main>
  </div>

  <!-- Settings modal -->
  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <h2 id="settingsTitle">Settings</h2>
        <button class="icon-btn" id="closeSettingsBtn" aria-label="Close settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <label class="field">
          <span class="field-label">Anthropic API Key</span>
          <div class="field-row">
            <input
              type="password"
              id="apiKeyInput"
              class="field-input"
              placeholder="sk-ant-..."
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" class="ghost-btn" id="toggleKeyVisibility">Show</button>
          </div>
          <span class="field-hint">
            Stored only in your browser's localStorage. Get one at
            <a href="https://console.anthropic.com/" target="_blank" rel="noopener">console.anthropic.com</a>.
          </span>
        </label>

        <label class="field">
          <span class="field-label">System prompt</span>
          <textarea
            id="systemPromptInput"
            class="field-input"
            rows="4"
            placeholder="You are a helpful assistant..."
          ></textarea>
        </label>

        <label class="field">
          <span class="field-label">Max tokens per response</span>
          <input
            type="number"
            id="maxTokensInput"
            class="field-input"
            min="64"
            max="64000"
            step="64"
            value="4096"
          />
        </label>

        <label class="field">
          <span class="field-label">Temperature</span>
          <input
            type="number"
            id="temperatureInput"
            class="field-input"
            min="0"
            max="1"
            step="0.1"
            value="1"
          />
        </label>
      </div>

      <div class="modal-footer">
        <button class="ghost-btn" id="cancelSettingsBtn">Cancel</button>
        <button class="primary-btn" id="saveSettingsBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
