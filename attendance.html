<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance — Sk Study Way</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
      <header class="topbar"></header>
      <div class="content">

        <div class="toolbar">
          <div class="field" style="margin:0;">
            <label style="font-size:12px;">Date</label>
            <input id="date" class="input" type="date" />
          </div>
          <div class="field" style="margin:0;">
            <label style="font-size:12px;">Batch Filter</label>
            <select id="filterBatch" class="select"><option value="">All Batches</option></select>
          </div>
          <div class="spacer"></div>
          <button class="btn btn-ghost" onclick="markAll('present')">Mark all Present</button>
          <button class="btn btn-ghost" onclick="markAll('absent')">Mark all Absent</button>
          <button class="btn btn-primary" onclick="viewReport()">&#128202; View Report</button>
        </div>

        <div class="stats stagger" id="attStats"></div>

        <div class="card">
          <div class="card-header">
            <h3>Mark Attendance &mdash; <span id="dateLabel"></span></h3>
            <span style="font-size:12px;color:var(--text-muted);">Click P / A / L to mark</span>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Roll</th>
                  <th>Name</th>
                  <th>Batch</th>
                  <th>Status</th>
                  <th>Mark</th>
                </tr>
              </thead>
              <tbody id="attList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div id="reportModal" class="modal-backdrop hidden">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Attendance Report</h3>
        <button class="modal-close" onclick="UI.closeModal('reportModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="row row-2" style="margin-bottom: 18px;">
          <div class="field" style="margin:0;">
            <label>From</label>
            <input id="reportFrom" class="input" type="date" />
          </div>
          <div class="field" style="margin:0;">
            <label>To</label>
            <input id="reportTo" class="input" type="date" />
          </div>
        </div>
        <button class="btn btn-primary" onclick="generateReport()" style="margin-bottom:18px;">Generate</button>
        <div id="reportBody"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal('reportModal')">Close</button>
        <button class="btn btn-primary" onclick="window.print()">&#128424; Print</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/attendance.js"></script>
</body>
</html>
