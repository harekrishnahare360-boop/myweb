<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sk Study Way — Sign in</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo">SK</div>
        <h1>Sk Study Way</h1>
        <p>Tuition Management Portal</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" class="input" type="text" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022" required autocomplete="current-password" />
        </div>
        <div id="err" style="color: var(--danger); font-size: 13px; margin-bottom: 12px; display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); text-align: center;">
        Default credentials: <strong>admin</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    AUTH.init();
    // If already logged in, jump to dashboard
    const auth = DB.read(DB.KEYS.AUTH, null);
    if (auth && auth.loggedIn) location.href = 'dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      if (AUTH.login(u, p)) {
        location.href = 'dashboard.html';
      } else {
        errEl.textContent = 'Invalid username or password.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
